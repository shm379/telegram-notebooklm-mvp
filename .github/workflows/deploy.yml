name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 107.178.208.169
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/telegram-notebooklm-mvp
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            export PYTHONPATH=$PYTHONPATH:$(pwd)/src
            pm2 restart tg-notebook || pm2 start "python3 -m telegram_notebook.bot" --name tg-notebook --env PYTHONPATH=$(pwd)/src
            pm2 save
